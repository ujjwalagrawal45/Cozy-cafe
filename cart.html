<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Cozy Cafe</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fas fa-coffee"></i> Cozy Cafe</a>

            <input type="checkbox" id="mobile-menu-checkbox">
            <label for="mobile-menu-checkbox" class="menu-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </label>

            <ul class="nav-links">
                <div class="nav-left">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="cart.html" class="nav-link" style="color: var(--primary-color);">Cart <span
                                class="cart-badge" style="display:none;">0</span></a></li>
                </div>
                <div class="nav-right">
                    <li><a href="payment.html" class="btn">Order Now</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <!-- Cart Layout -->
    <div class="container section">
        <h1 class="text-center" style="margin-bottom: 40px;">Shopping Cart</h1>

        <div class="cart-layout" style="display: flex; gap: 40px; flex-wrap: wrap;">

            <!-- Cart Items (dynamically rendered by JS) -->
            <div id="cart-items-container" style="flex: 2; min-width: 300px;">
                <!-- JS populates this from localStorage -->
            </div>

            <!-- Order Summary -->
            <div class="order-summary" style="flex: 1; min-width: 280px; height: fit-content;">
                <div class="card" style="padding: 30px;">
                    <h3>Order Summary</h3>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #555;">
                        <span>Subtotal</span>
                        <span id="cart-subtotal">₹0.00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #555;">
                        <span>Tax (5%)</span>
                        <span id="cart-tax">₹0.00</span>
                    </div>
                    <div id="cart-overtime-row"
                        style="display: none; justify-content: space-between; margin-bottom: 15px; color: #cc3333; font-weight: 500;">
                        <span>Overtime Surcharge (10%)</span>
                        <span id="cart-overtime">₹0.00</span>
                    </div>
                    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;">
                    <div
                        style="display: flex; justify-content: space-between; margin-bottom: 30px; font-weight: 700; font-size: 1.2rem; color: var(--primary-color);">
                        <span>Total</span>
                        <span id="cart-total">₹0.00</span>
                    </div>
                    <a href="payment.html" class="btn" style="width: 100%; text-align: center;">Proceed to Payment</a>
                    <div style="text-align: center; margin-top: 15px;">
                        <a href="menu.html" style="font-size: 0.9rem; text-decoration: underline;">Continue Shopping</a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js?v=2"></script>
    <!-- jQuery CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- jQuery Features Module -->
    <script src="jquery-features.js?v=2"></script>
</body>

</html>
