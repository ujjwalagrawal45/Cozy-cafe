<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Cozy Cafe</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo"><i class="fas fa-coffee"></i> Cozy Cafe</a>

            <input type="checkbox" id="mobile-menu-checkbox">
            <label for="mobile-menu-checkbox" class="menu-toggle">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </label>

            <ul class="nav-links">
                <div class="nav-left">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="menu.html" class="nav-link">Menu</a></li>
                    <li><a href="cart.html" class="nav-link">Cart <span class="cart-badge"
                                style="display:none;">0</span></a></li>
                </div>
                <div class="nav-right">
                    <li><a href="payment.html" class="btn">Order Now</a></li>
                </div>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <header class="page-header section text-center"
        style="background-color: var(--secondary-color); color: var(--white); padding: 40px 0;">
        <h1>Our Menu</h1>
        <p>Hand-crafted with love and the finest ingredients.</p>
    </header>

    <!-- Search & Filter Bar -->
    <div class="container" style="margin-top: 30px;">
        <div class="menu-controls"
            style="display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: space-between;">
            <div class="search-bar" style="flex: 1; min-width: 250px; max-width: 400px; position: relative;">
                <i class="fas fa-search"
                    style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #999;"></i>
                <input type="text" id="menu-search" class="form-input" placeholder="Search menu items..."
                    style="padding-left: 42px; border-radius: 30px; width: 100%;">
            </div>
            <div class="filter-pills" style="display: flex; gap: 10px; flex-wrap: wrap;">
                <button class="filter-pill active" data-category="all">All</button>
                <button class="filter-pill" data-category="beverages"><i class="fas fa-mug-hot"></i> Beverages</button>
                <button class="filter-pill" data-category="snacks"><i class="fas fa-utensils"></i> Snacks</button>
                <button class="filter-pill" data-category="desserts"><i class="fas fa-ice-cream"></i> Desserts</button>
            </div>
        </div>
    </div>

    <!-- Menu Items (dynamically rendered by JS) -->
    <div class="container section" id="menu-container" style="padding-top: 30px;">
        <!-- JS will populate this -->
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="copyright">
                <p>&copy; 2026 Cozy Cafe. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js?v=2"></script>
    <!-- jQuery CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- jQuery Features Module -->
    <script src="jquery-features.js?v=2"></script>
</body>

</html>
